version: "2.4"

services:
  api:
    container_name: zhenzhi-knowledge-api
    build:
      context: ../..
      dockerfile: deploy/lighthouse/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ZHENZHI_KNOWLEDGE_API_BIND}:8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/projects/company_knowledge_core/repo:/knowledge
    command:
      - /bin/sh
      - -c
      - |
        python -m zhenzhi_knowledge --root /knowledge publish --actor system.boot --reason container-startup
        python -m zhenzhi_knowledge --root /knowledge api serve --host 0.0.0.0 --port 8765

  postgres:
    image: postgres:16-alpine
    container_name: zhenzhi-knowledge-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhenzhi -d zhenzhi_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
