version: '3.3'

services:
  api:
    container_name: zhenzhi-knowledge-api
    build:
      context: ../..
      dockerfile: deploy/lighthouse/Dockerfile
    restart: unless-stopped
    environment:
      ZHENZHI_KNOWLEDGE_API_TOKEN: ${ZHENZHI_KNOWLEDGE_API_TOKEN}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_ALLOW_UNSIGNED_EVENTS: ${FEISHU_ALLOW_UNSIGNED_EVENTS:-false}
      FEISHU_REPLY_ENABLED: ${FEISHU_REPLY_ENABLED:-true}
      FEISHU_TOKEN_AUTO_APPROVE: ${FEISHU_TOKEN_AUTO_APPROVE:-false}
      FEISHU_APPROVAL_ENABLED: ${FEISHU_APPROVAL_ENABLED:-false}
      FEISHU_APPROVAL_CODE_PROJECT: ${FEISHU_APPROVAL_CODE_PROJECT:-}
      FEISHU_APPROVAL_CODE_COMMON: ${FEISHU_APPROVAL_CODE_COMMON:-}
      FEISHU_APPROVAL_CODE_SECURITY: ${FEISHU_APPROVAL_CODE_SECURITY:-}
      FEISHU_APPROVAL_NODE_APPROVER_KEY: ${FEISHU_APPROVAL_NODE_APPROVER_KEY:-}
      FEISHU_COMMON_REVIEWER_OPEN_IDS: ${FEISHU_COMMON_REVIEWER_OPEN_IDS:-}
      FEISHU_SECURITY_REVIEWER_OPEN_IDS: ${FEISHU_SECURITY_REVIEWER_OPEN_IDS:-}
      FEISHU_PROJECT_REVIEWER_OPEN_IDS_JSON: ${FEISHU_PROJECT_REVIEWER_OPEN_IDS_JSON:-{}}
      FEISHU_TOKEN_SEND_ON_APPROVAL: ${FEISHU_TOKEN_SEND_ON_APPROVAL:-false}
      FEISHU_APPROVAL_WIDGET_CHANGE_TYPE: ${FEISHU_APPROVAL_WIDGET_CHANGE_TYPE:-widget17816810502430001}
      FEISHU_APPROVAL_WIDGET_PROJECT_NAME: ${FEISHU_APPROVAL_WIDGET_PROJECT_NAME:-widget17816812084890001}
      FEISHU_APPROVAL_WIDGET_PROJECT_OWNER: ${FEISHU_APPROVAL_WIDGET_PROJECT_OWNER:-widget17816816166430001}
      FEISHU_APPROVAL_WIDGET_SUB_TYPE: ${FEISHU_APPROVAL_WIDGET_SUB_TYPE:-widget17816812747070001}
      FEISHU_APPROVAL_WIDGET_MEMBER: ${FEISHU_APPROVAL_WIDGET_MEMBER:-widget17816813081730001}
      FEISHU_APPROVAL_WIDGET_DESCRIPTION: ${FEISHU_APPROVAL_WIDGET_DESCRIPTION:-widget17816813651240001}
      FEISHU_APPROVAL_TYPE_VALUE_AGENT_TOKEN: ${FEISHU_APPROVAL_TYPE_VALUE_AGENT_TOKEN:-mqhqw8sk-3kt86yj7owt-0}
      FEISHU_APPROVAL_TYPE_VALUE_PROJECT_INIT: ${FEISHU_APPROVAL_TYPE_VALUE_PROJECT_INIT:-mqhqw8sk-x7hpdoqx0p-0}
      FEISHU_APPROVAL_TYPE_VALUE_KNOWLEDGE_INGEST: ${FEISHU_APPROVAL_TYPE_VALUE_KNOWLEDGE_INGEST:-mqhqw8sk-kybdohz4afi-0}
      FEISHU_APPROVAL_SUB_TYPE_DEFAULT_VALUE: ${FEISHU_APPROVAL_SUB_TYPE_DEFAULT_VALUE:-}
      FEISHU_APPROVAL_DOC_WIKI_NODE: ${FEISHU_APPROVAL_DOC_WIKI_NODE:-GZ59w7hsNijjXYk9BNocCQjFnpc}
      FEISHU_APPROVAL_DOC_DOMAIN: ${FEISHU_APPROVAL_DOC_DOMAIN:-https://xcn68awb7dsi.feishu.cn}
    ports:
      - "${ZHENZHI_KNOWLEDGE_API_BIND}:8765:8765"
    volumes:
      - /opt/projects/company_knowledge_core/repo:/knowledge
    command:
      - /bin/sh
      - -c
      - |
        python -m zhenzhi_knowledge --root /knowledge validate
        python -m zhenzhi_knowledge --root /knowledge index rebuild
        python -m zhenzhi_knowledge --root /knowledge rag rebuild
        python -m zhenzhi_knowledge --root /knowledge api serve --host 0.0.0.0 --port 8765
